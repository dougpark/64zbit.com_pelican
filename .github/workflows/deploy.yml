name: Deploy Pelican Site

on:
  push:
    branches:
      - master  # or 'master'
  schedule:
    # This runs at 6:00 AM Central Time (11:00 UTC) every day
    - cron: '0 11 * * *'
  workflow_dispatch: # Keeps the manual "Play" button active
  repository_dispatch:
    types: [manual_deploy]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Using a stable 3.12 instead of 3.14 for CI reliability

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Add any specific ones we fixed today just in case
          pip install markupsafe==2.0.1 jinja2==3.0.3 pelican-jinja2content

      - name: Build site
        run: make publish
        env:
          PINBOARD_TOKEN: ${{ secrets.PINBOARD_TOKEN }} # This maps the Secret to an Env Var

      - name: Commit and Push new Pinboard posts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all new files (assuming they are in your content folder)
          git add content/
          
          # Only commit if there are actually changes to avoid errors
          if git diff --cached --quiet; then
            echo "No new bookmarks found. Skipping commit."
          else
            git commit -m "Automated update from Pinboard $(date)"
            git push origin master
          fi

      - name: Deploy to Linode
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.LINODE_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "output/" # The folder Pelican creates
          REMOTE_HOST: "45.33.116.242"
          REMOTE_USER: "pi"
          TARGET: "/home/pi/prod_volumes/public_html/apache" # Where Apache looks