name: Deploy Pelican Site

on:
  push:
    branches:
      - main  # or 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Using a stable 3.12 instead of 3.14 for CI reliability

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Add any specific ones we fixed today just in case
          pip install markupsafe==2.0.1 jinja2==3.0.3 pelican-jinja2content

      - name: Build site
        run: make publish

      - name: Deploy to Linode
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.LINODE_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "output/" # The folder Pelican creates
          REMOTE_HOST: "45.33.116.242"
          REMOTE_USER: "pi"
          TARGET: "/home/pi/prod_volumes/public_html/apache" # Where Apache looks